apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if .Values.api.secrets.SENTINEL_API_KEY }}
  sentinel-api-key: {{ .Values.api.secrets.SENTINEL_API_KEY | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.GITHUB_TOKEN }}
  github-token: {{ .Values.api.secrets.GITHUB_TOKEN | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.GITHUB_WEBHOOK_SECRET }}
  github-webhook-secret: {{ .Values.api.secrets.GITHUB_WEBHOOK_SECRET | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.SLACK_BOT_TOKEN }}
  slack-bot-token: {{ .Values.api.secrets.SLACK_BOT_TOKEN | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.SLACK_WEBHOOK_URL }}
  slack-webhook-url: {{ .Values.api.secrets.SLACK_WEBHOOK_URL | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.DISCORD_BOT_TOKEN }}
  discord-bot-token: {{ .Values.api.secrets.DISCORD_BOT_TOKEN | b64enc }}
  {{- end }}
  {{- if .Values.api.secrets.DISCORD_WEBHOOK_URL }}
  discord-webhook-url: {{ .Values.api.secrets.DISCORD_WEBHOOK_URL | b64enc }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.fullname" . }}-database
  labels:
    app.kubernetes.io/name: {{ include "sentinel.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  database-url: {{ printf "postgresql+asyncpg://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "sentinel.fullname" .) .Values.postgresql.auth.database | b64enc }}
  postgres-password: {{ .Values.postgresql.auth.password | b64enc }}
