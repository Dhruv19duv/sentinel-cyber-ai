# ── Sentinel Helm Chart Values ──
# Default configuration values for production Kubernetes deployment.

replicaCount: 2

image:
  repository: ghcr.io/sentinel-cyber-ai/sentinel
  tag: latest
  pullPolicy: Always
  pullSecrets:
    - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

# ── API Configuration ──
api:
  enabled: true
  port: 8080
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80
  env:
    SENTINEL_LOG_LEVEL: "INFO"
    SENTINEL_CORS_ORIGINS: "https://sentinel-ai.dev"
    PYTHONUNBUFFERED: "1"
    WORKERS: "4"
  secrets:
    SENTINEL_API_KEY: ""
    GITHUB_TOKEN: ""
    GITHUB_WEBHOOK_SECRET: ""
    SLACK_BOT_TOKEN: ""
    SLACK_WEBHOOK_URL: ""
    DISCORD_BOT_TOKEN: ""
    DISCORD_WEBHOOK_URL: ""

# ── Dashboard Configuration ──
dashboard:
  enabled: true
  port: 8500
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# ── Worker Configuration ──
worker:
  enabled: true
  replicas: 2
  concurrency: 4
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# ── Database ──
postgresql:
  enabled: true
  auth:
    database: sentinel
    username: sentinel
    password: ""
    existingSecret: ""
  primary:
    resources:
      requests:
        memory: "256Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    persistence:
      size: 10Gi

# ── Cache ──
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: "128Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    persistence:
      size: 5Gi

# ── Ingress ──
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hosts:
    - host: api.sentinel-ai.dev
      paths:
        - path: /
          pathType: Prefix
          service: api
    - host: dashboard.sentinel-ai.dev
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
  tls:
    - secretName: sentinel-tls
      hosts:
        - api.sentinel-ai.dev
        - dashboard.sentinel-ai.dev

# ── Monitoring (Prometheus + Grafana) ──
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 15d
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
  grafana:
    enabled: true
    adminPassword: ""
    dashboards:
      enabled: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# ── Service Mesh ──
service:
  type: ClusterIP
  annotations: {}

# ── Pod Security ──
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

# ── Resource Quotas ──
global:
  environment: production
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
