# Sentinel Cyber AI - Training Configuration
# ==========================================
# Edit this file to control your fine-tuning runs.

model:
  # Base model to fine-tune
  # Options:
  #   - "unsloth/DeepSeek-R1-Distill-Qwen-7B-bnb-4bit"  (best reasoning)
  #   - "unsloth/Qwen3.5-7B-bnb-4bit"                    (best code understanding)
  #   - "unsloth/Llama-4-8B-bnb-4bit"                    (most compatible)
  #   - "unsloth/DeepSeek-R1-Distill-Qwen-1.5B-bnb-4bit" (for CPU/limited RAM testing)
  base_model: "unsloth/DeepSeek-R1-Distill-Qwen-7B-bnb-4bit"
  
  # Load in 4-bit quantized mode (reduces VRAM usage by ~4x)
  load_in_4bit: true
  
  # Maximum sequence length for training
  max_seq_length: 4096

training:
  # Output directory for checkpoints and final model
  output_dir: "./outputs/sentinel-v1"
  
  # Number of training epochs
  num_epochs: 3
  
  # Batch size per GPU (adjust based on VRAM)
  #   - 4GB VRAM: 1
  #   - 16GB VRAM: 4
  #   - 24GB+ VRAM: 8-16
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  
  # Gradient accumulation steps (effective batch = batch_size * accumulation_steps)
  gradient_accumulation_steps: 4
  
  # Learning rate for LoRA (typically 1e-4 to 5e-4)
  learning_rate: 2e-4
  
  # Learning rate scheduler
  lr_scheduler_type: "cosine"
  
  # Warmup ratio
  warmup_ratio: 0.03
  
  # Optimizer
  optimizer: "adamw_8bit"
  
  # Logging and saving
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  
  # Precision
  bf16: true   # Use bfloat16 if available (Ampere+ GPUs)
  fp16: false  # Fallback to fp16 if bf16 unavailable

lora:
  # LoRA rank (higher = more expressive, more VRAM)
  #   - 16: Lightweight, good for style adaptation
  #   - 32: Balanced (recommended)
  #   - 64: Heavy, for complex tasks
  r: 32
  
  # LoRA alpha (scaling factor, typically 2x rank)
  lora_alpha: 64
  
  # LoRA dropout (helps prevent overfitting)
  lora_dropout: 0.05
  
  # Which modules to apply LoRA to
  # Model families and their module names:
  #   - LLaMA (Llama 3/4):       q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  #   - Qwen (Qwen 2.5/3):       q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  #   - DeepSeek (R1/V4):        q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  #   - Mistral:                  q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  #   - Gemma:                    q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj
  # The defaults below work for LLaMA/Qwen/DeepSeek/Mistral families.
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

dataset:
  # Path to training data
  train_file: "./data/processed/cyber_train.jsonl"
  
  # Path to validation data (optional)
  val_file: "./data/processed/cyber_val.jsonl"
  
  # Train/validation split ratio (used if no val_file specified)
  train_val_split: 0.9
  
  # Maximum number of training examples (set to -1 for all)
  max_train_samples: -1
  max_val_samples: 100
