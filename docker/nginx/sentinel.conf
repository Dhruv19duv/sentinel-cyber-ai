# ── Common SSL configuration ──
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1h;
ssl_stapling on;
ssl_stapling_verify on;

# ── Default server (accepts raw IP, no hostname match) ──
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    # Also handle the defined hostnames here for direct HTTP access
    location /health {
        proxy_pass http://sentinel-api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /docs {
        proxy_pass http://sentinel-api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://sentinel-api/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /redoc {
        proxy_pass http://sentinel-api/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://sentinel-api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://sentinel-api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://sentinel-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── ACME HTTP challenge (for Let's Encrypt — hostname-specific) ──
server {
    listen 80;
    server_name api.sentinel-ai.dev dashboard.sentinel-ai.dev;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Sentinel API (HTTPS) ──
server {
    listen 443 ssl;
    http2 on;
    server_name api.sentinel-ai.dev;

    ssl_certificate /etc/nginx/ssl/live/api.sentinel-ai.dev/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.sentinel-ai.dev/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Rate limiting
    limit_req zone=api burst=50 nodelay;
    limit_conn conn 100;

    location / {
        proxy_pass http://sentinel-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://sentinel-api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /docs {
        proxy_pass http://sentinel-api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://sentinel-api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/sentinel-api.log main;
    error_log /var/log/nginx/sentinel-api-error.log warn;
}

# ── Sentinel Dashboard (HTTPS) ──
server {
    listen 443 ssl;
    http2 on;
    server_name dashboard.sentinel-ai.dev;

    ssl_certificate /etc/nginx/ssl/live/dashboard.sentinel-ai.dev/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/dashboard.sentinel-ai.dev/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Rate limiting
    limit_req zone=dashboard burst=20 nodelay;

    location / {
        proxy_pass http://sentinel-dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://sentinel-dashboard/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/sentinel-dashboard.log main;
    error_log /var/log/nginx/sentinel-dashboard-error.log warn;
}

# Status page (internal only)
server {
    listen 8080;
    server_name localhost;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
