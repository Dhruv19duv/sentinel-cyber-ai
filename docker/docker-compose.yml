version: "3.8"

services:
  sentinel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sentinel-cyber-ai:latest
    container_name: sentinel-api
    ports:
      - "8080:8080"
    environment:
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-}
      - SENTINEL_CORS_ORIGINS=${SENTINEL_CORS_ORIGINS:-*}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  sentinel-sandbox:
    image: python:3.12-slim
    container_name: sentinel-sandbox
    profiles:
      - sandbox
    command: ["tail", "-f", "/dev/null"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
    network_mode: "none"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  sentinel-training:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sentinel-training
    profiles:
      - training
    command: ["python", "-m", "scripts.train_sentinel"]
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../config:/app/config
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  sentinel-data:

networks:
  sentinel-network:
    driver: bridge
