# =============================================================================
# Sentinel Cyber AI — Grafana Datasource Configuration
# Auto-provisioned on container start
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    uid: prometheus_ds
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"

  - name: Loki (Optional)
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    uid: loki_ds
    jsonData:
      timeout: "30s"
      maxLines: 1000
