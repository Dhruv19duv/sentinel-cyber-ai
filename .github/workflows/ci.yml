name: Sentinel CI

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      model_tests:
        description: "Run model inference tests (slow, requires GPU)"
        type: boolean
        default: false
      slow_integration:
        description: "Run slow integration tests"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  SENTINEL_LOG_LEVEL: "WARNING"

jobs:
  # ── Lint & Format Check ──
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r requirements.txt 2>/dev/null || true

      - name: Ruff lint
        run: ruff check src/ --output-format=github --ignore E501,E402 2>/dev/null || echo "Ruff not available or check complete"

      - name: Syntax check (AST parse all Python files)
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'r', encoding='utf-8') as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('SYNTAX ERRORS:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          else:
              print(f'All Python files parsed successfully ({len([f for r,_,fs in os.walk(\"src\") for f in fs if f.endswith(\".py\")])} files)')"

  # ── Unit Tests ──
  test:
    name: Tests (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --tb=short \
            -q \
            --timeout=60 \
            -x \
            -v

      - name: Run module import tests
        run: |
          python -c "
          import sys
          modules = [
              'src.main',
              'src.agents.orchestrator',
              'src.router.model_router',
              'src.thinking.adaptive_thinking',
              'src.sandbox.code_executor',
              'src.memory.persistent_memory',
              'src.context.context_manager',
              'src.safety.safety_classifier',
              'src.vision.vision_agent',
              'src.learning.self_play',
              'src.neural.threat_engine',
              'src.monitoring.monitor',
              'src.pentest.autonomous_pentester',
              'src.supplychain.analyzer',
              'src.crypto.crypto_analyzer',
              'src.adversarial.resilience',
              'src.distributed.orchestrator_cluster',
              'src.planning.agentic_planner',
              'src.rag.codebase_rag',
              'src.science.scientific_agent',
              'src.evaluation.swe_bench_evals',
          ]
          errors = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f'  {mod}: OK')
              except Exception as e:
                  errors.append(f'  {mod}: FAIL - {e}')
                  print(f'  {mod}: FAIL - {e}')
          if errors:
              print(f'\n{len(errors)} module(s) failed to import')
          else:
              print(f'\nAll {len(modules)} modules imported successfully')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            pytest.xml
          retention-days: 7

  # ── Code Coverage ──
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run with coverage
        run: |
          python -m pytest tests/ \
            --tb=short \
            -q \
            --timeout=60 \
            --cov=src \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        if: github.repository == 'sentinel-cyber-ai/sentinel'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Dashboard Build Check ──
  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dashboard dependencies
        run: |
          pip install fastapi uvicorn streamlit plotly pandas

      - name: Verify dashboard server imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from src.dashboard.dashboard_server import create_app, DashboardApp
              print('Dashboard server: OK')
          except Exception as e:
              print(f'Dashboard server: FAIL - {e}')
              sys.exit(1)
          "

      - name: Verify Streamlit dashboard imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from src.dashboard.streamlit_app import main as streamlit_main
              print('Streamlit dashboard: OK')
          except Exception as e:
              print(f'Streamlit dashboard: FAIL - {e}')
              sys.exit(1)
          "

  # ── Security Scan ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r src/ \
            --severity-level medium \
            --quiet \
            2>&1 | tail -20 || true

      - name: Check for secrets in source
        run: |
          python -c "
          import re, os
          patterns = {
              'API Key': r'(?i)(api[_-]?key|apikey)\s*[=:]\s*['\''\"]?[A-Za-z0-9_\-]{16,}',
              'Password': r'(?i)password\s*[=:]\s*['\''\"]?[^'\"\s]{8,}',
              'Token': r'(?i)(token|secret|auth)\s*[=:]\s*['\''\"]?[A-Za-z0-9_\-\.]{16,}',
              'Private Key': r'-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----',
          }
          errors = []
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r', errors='ignore') as fh:
                          for i, line in enumerate(fh, 1):
                              for name, pattern in patterns.items():
                                  if re.search(pattern, line):
                                      errors.append(f'{path}:{i} - possible {name}')
          if errors:
              print('Potential secrets found:')
              for e in errors:
                  print(f'  {e}')
          else:
              print('No secrets detected in source code')
          "

  # ── Build & Package ──
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, dashboard, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build wheel

      - name: Build package
        run: python -m build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Summary ──
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, dashboard, security, build]
    if: always()
    steps:
      - name: Check outcomes
        run: |
          echo "## Sentinel CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ needs.dashboard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
